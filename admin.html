<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — ShirTory</title>
<link rel="icon" type="image/png" href="images/logo.png"/>
<script>
// If already logged in, skip straight to the dashboard.
(function(){
  try{
    const s = JSON.parse(sessionStorage.getItem('shirtory_session'));
    if(s && s.username && s.role){ window.location.href='dashboard.html'; }
  }catch(e){}
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1b1b1b;--ink:#f0ece4;--muted:#8a8a8a;--accent:#C9A84C;--accent2:#7B1A1A;--border:#242424}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{width:100%;max-width:380px}
  .logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px}
  .logo-row img{width:38px;height:38px;object-fit:contain}
  .logo-row span{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700}
  .logo-row span b{color:var(--accent2)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 26px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .card h2{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:4px;text-align:center}
  .card p.sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:22px}
  label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;margin-top:16px}
  label:first-of-type{margin-top:0}
  input{width:100%;font:inherit;color:var(--ink);background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:11px 13px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  .btn-login{width:100%;margin-top:22px;background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s}
  .btn-login:hover{opacity:.9}
  .btn-login:disabled{opacity:.6;cursor:not-allowed}
  .err{display:none;background:#8a202022;border:1px solid #8a2020;color:#f3a3a3;font-size:.78rem;border-radius:8px;padding:10px 12px;margin-top:16px;text-align:center}
  .back{display:block;text-align:center;margin-top:18px;font-size:.78rem;color:var(--muted);text-decoration:none}
  .back:hover{color:var(--ink)}
</style>
</head>
<body>
<div class="box">
  <div class="logo-row"><img src="images/logo.png" alt="ShirTory"/><span>Shir<b>Tory</b></span></div>
  <div class="card">
    <h2>Admin Login</h2>
    <p class="sub">শুধুমাত্র অথরাইজড টিম মেম্বারদের জন্য</p>
    <label>Username</label>
    <input id="l_username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
    <label>Password</label>
    <input id="l_password" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Login</button>
    <div class="err" id="loginErr">❌ Username বা Password ভুল হয়েছে</div>
  </div>
  <a href="index.html" class="back">&larr; ShirTory ওয়েবসাইটে ফিরে যান</a>
</div>

<script>
const DEFAULT_USERS = [
  {username:'shirtory', password:'786786', role:'master_admin', name:'Master Admin'},
  {username:'mod1', password:'mod123', role:'moderator', name:'Moderator 1'},
];

async function doLogin(){
  const username = document.getElementById('l_username').value.trim();
  const password = document.getElementById('l_password').value;
  const errBox = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errBox.style.display = 'none';

  if(!username || !password){
    errBox.textContent = '❌ Username ও Password দুটোই দিন';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = 'Checking…';

  let users = DEFAULT_USERS;
  try{
    const doc = await db.collection('shirtory').doc('users').get();
    if(doc.exists && Array.isArray(doc.data().list) && doc.data().list.length){
      users = doc.data().list;
    }
  }catch(err){
    console.error('User list fetch failed, falling back to default users:', err);
  }

  const match = users.find(u =>
    u.username.toLowerCase() === username.toLowerCase() && u.password === password
  );

  btn.disabled = false; btn.textContent = 'Login';

  if(!match){
    errBox.textContent = '❌ Username বা Password ভুল হয়েছে';
    errBox.style.display = 'block';
    return;
  }

  sessionStorage.setItem('shirtory_session', JSON.stringify({
    username: match.username, role: match.role, name: match.name || match.username
  }));
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
